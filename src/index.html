<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ambiente 3D - Sistema Solar</title>
  <style>
    body { margin: 0; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    // Configuração da cena, câmera e renderizador
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030342); // Azul quase preto
    scene.fog = new THREE.Fog(0x030342, 0.002); // Objetos longe somem na cor do fundo

    const camera = new THREE.PerspectiveCamera(
            75, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.z = 15;

    const camera2 = new THREE.PerspectiveCamera(
            80, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera2.position.z = 18;
    const w = 1920;
    const h = 1080;
    const fullWidth = w * 3;
    const fullHeight = h * 2;
    camera2.setViewOffset(fullWidth, fullHeight, 500, 500, w, h);
    /*const aspect = window.innerWidth / window.innerHeight;

    const camera = new THREE.OrthographicCamera(
        -aspect * 5, // left
        aspect * 5, // right
        5,          // top
        -5,          // bottom
        0.1,        // near
        1000        // far
    );*/

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Adicionar controle orbital
    const controls = new OrbitControls(camera, renderer.domElement);

    // Adicionar peso a rotação da câmera
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;

    // Configurações de zoom in e zoom out
    controls.minDistance = 15;
    controls.maxDistance = 30;
    camera.position.set( 0, 20, 100 );
    controls.update();

    // Criação do Sol
    const sunGeometry = new THREE.SphereGeometry(6, 64, 32);
    const textureLoader = new THREE.TextureLoader();
    const sunTexture = textureLoader.load("./textures/2k_sun.jpg");

    const sunVertexShader = `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const sunFragmentShader = `
      uniform float uTime;
      uniform sampler2D uSunTexture;
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;

      // Permutation polynomial hash (Stefan Gustavson)
      vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
      vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

      // Simplex noise 3D
      float snoise(vec3 v) {
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i  = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g  = step(x0.yzx, x0.xyz);
        vec3 l  = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(
          i.z + vec4(0.0, i1.z, i2.z, 1.0))
          + i.y + vec4(0.0, i1.y, i2.y, 1.0))
          + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j  = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x  = x_ * ns.x + ns.yyyy;
        vec4 y  = y_ * ns.x + ns.yyyy;
        vec4 h  = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0) * 2.0 + 1.0;
        vec4 s1 = floor(b1) * 2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
      }

      // FBM com domain warping agressivo
      float fbm(vec3 p) {
        float f = 0.0;
        float amp = 0.5;
        float freq = 1.0;
        for (int i = 0; i < 8; i++) {
          f += amp * snoise(p * freq);
          freq *= 2.03;
          amp  *= 0.5;
        }
        return f;
      }

      void main() {
        vec4 texColor = texture2D(uSunTexture, vUv);

        // Posição 3D na esfera usada como domínio do ruído
        vec3 p = normalize(vPosition);

        // Domain warping em 2 camadas
        float t = uTime * 0.12;
        vec3 warp1 = vec3(
          fbm(p * 2.5 + vec3(t, 0.0, 0.0)),
          fbm(p * 2.5 + vec3(0.0, t, 0.0)),
          fbm(p * 2.5 + vec3(0.0, 0.0, t))
        );
        vec3 warp2 = vec3(
          fbm(p * 3.0 + 2.3 * warp1 + vec3(1.7, 9.2, 3.4) + t * 0.5),
          fbm(p * 3.0 + 2.3 * warp1 + vec3(8.3, 2.8, 5.1) + t * 0.5),
          fbm(p * 3.0 + 2.3 * warp1 + vec3(4.1, 6.7, 1.9) + t * 0.5)
        );
        float f = fbm(p * 4.0 + 2.5 * warp2 + t * 0.3);

        // Normalizar para [0,1]
        f = f * 0.5 + 0.5;

        // Paleta de cores do sol: núcleo branco-amarelo → laranja → vermelho escuro
        vec3 c0 = vec3(0.05, 0.01, 0.0);   // muito escuro (manchas)
        vec3 c1 = vec3(0.6,  0.1,  0.0);   // vermelho-laranja profundo
        vec3 c2 = vec3(1.0,  0.4,  0.0);   // laranja
        vec3 c3 = vec3(1.0,  0.8,  0.1);   // amarelo quente
        vec3 c4 = vec3(1.0,  1.0,  0.9);   // branco quente (núcleo)

        vec3 sunColor;
        if (f < 0.25)      sunColor = mix(c0, c1, f / 0.25);
        else if (f < 0.5)  sunColor = mix(c1, c2, (f - 0.25) / 0.25);
        else if (f < 0.75) sunColor = mix(c2, c3, (f - 0.5)  / 0.25);
        else               sunColor = mix(c3, c4, (f - 0.75) / 0.25);

        // Mistura leve com a textura original para detalhe extra
        sunColor = mix(sunColor, texColor.rgb * vec3(1.2, 0.8, 0.3), 0.18);

        // Limb darkening sutil (borda ligeiramente mais escura, como no sol real)
        float limb = dot(vNormal, vec3(0.0, 0.0, 1.0));
        limb = clamp(limb, 0.0, 1.0);
        sunColor *= 0.75 + 0.25 * limb;

        // Pulsação de emissão
        float pulse = 0.97 + 0.03 * sin(uTime * 1.5 + f * 6.28);
        sunColor *= pulse;

        gl_FragColor = vec4(sunColor, 1.0);
      }
    `;

    const sunUniforms = {
      uTime:       { value: 0.0 },
      uSunTexture: { value: sunTexture }
    };

    const sunMaterial = new THREE.ShaderMaterial({
      vertexShader:   sunVertexShader,
      fragmentShader: sunFragmentShader,
      uniforms:       sunUniforms
    });

    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    scene.add(sun);

    // Criação da Terra
    const earthGeometry = new THREE.SphereGeometry(2.1, 64, 32);
    const earthTexture = textureLoader.load("./textures/2k_earth_daymap.jpg");
    const earthMaterial = new THREE.MeshBasicMaterial({map: earthTexture});
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earth.position.set(-23, 0, 0);
    scene.add(earth);

    //Criação do Mercúrio
    const mercGeometry = new THREE.SphereGeometry(0.9, 64, 32);
    const texturemercLoader = new THREE.TextureLoader();
    const mercTexture = textureLoader.load("./textures/2k_mercury.jpg");
    const normalTexture = textureLoader.load("./textures/normal_bump_texture");
    const mercMaterial = new THREE.MeshBasicMaterial({map: mercTexture, normalMap: normalTexture});
    const merc = new THREE.Mesh(mercGeometry, mercMaterial);
    merc.position.set(10, 0, 0);
    scene.add(merc);

    //Criação de Vênus
    const venusGeometry = new THREE.SphereGeometry(2.0, 64, 32);
    const venusTexture = textureLoader.load("./textures/2k_venus.jpg");
    const venusMaterial = new THREE.MeshBasicMaterial({map: venusTexture});
    const venus = new THREE.Mesh(venusGeometry, venusMaterial);
    venus.position.set(0, 0, 0);
    scene.add(venus);
    let little_prince;
    const gltfLoader = new GLTFLoader();
    gltfLoader.load('./models/little_prince.glb', (gltf) => {
      const object = gltf.scene;
      console.log('Objeto GLB carregado:', object);

       // REDUZIR MUITO A ESCALA primeiro
      object.scale.set(0.022, 0.022, 0.022);

      // Posicionar EXATAMENTE acima do Mercúrio
      object.position.set(10, 2.5, 0); // x=10 (mercúrio), y=3 (acima), z=0

      // Rotacionar se necessário
      object.rotation.x = 0;
      object.rotation.y = -5;
      object.rotation.z = 0;

      scene.add(object);
      little_prince = object;
      console.log('Objeto adicionado à cena');
    }, undefined, (error) => {
      console.error('Erro ao carregar objeto:', error);
    });



    // Nuvem de poeira
    const mainCosmicDustTexture = textureLoader.load("./textures/main_cosmic_dust.png");
    const materialSprite = new THREE.MeshStandardMaterial({
          map: mainCosmicDustTexture,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 1,
          blending: THREE.AdditiveBlending
      });

    const geometrySphere = new THREE.IcosahedronGeometry(850, 15); // Mais segmentos = textura mais suave
    const geometrySphere_ = new THREE.Mesh(geometrySphere, materialSprite);
    scene.add(geometrySphere_);




    // Adicionar estrelas
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    for (let i = 0; i < 10000; i++) {
        const x = THREE.MathUtils.randFloatSpread( 2000 );
	    const y = THREE.MathUtils.randFloatSpread( 2000 );
	    const z = THREE.MathUtils.randFloatSpread( 2000 );
	    vertices.push( x, y, z );
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    const material_ = new THREE.PointsMaterial({ color: 0x888888, size: 1 });
    const points = new THREE.Points(geometry, material_);
    scene.add(points);

    let useOrtho = true;
    let cameraused = useOrtho ? camera : camera2;
    window.addEventListener("keydown", (event) => {
      if (event.key === "c") {
        useOrtho = !useOrtho;
        cameraused = useOrtho ? camera : camera2;
      }
    });
    let venus_angle = 0;
    let merc_angle = 0;
    let earth_angle = 0;

    const clock = new THREE.Clock();

    // Animação do Sol e Terra (necessário, se não a cena não será renderizada)
    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      sunUniforms.uTime.value = elapsed;

      sun.rotation.y += 0.0067;
      earth.rotation.y += 0.003;
      //Animação do Mercurio
      merc.rotation.y += 0.0034;
      //Rotação de Vênus
      venus.rotation.y += 0.0008;
      venus.position.set(16*Math.cos(venus_angle),0,16*Math.sin(venus_angle));
      venus_angle += 2*Math.PI/225
      venus_angle = venus_angle%(2*Math.PI);
      merc.position.set(-10*Math.cos(merc_angle),0,-10*Math.sin(merc_angle))
      little_prince.position.set(-10*Math.cos(merc_angle),2.5,-10*Math.sin(merc_angle))
      merc_angle += 2*Math.PI/88;
      merc_angle = merc_angle%(2*Math.PI);
      earth.position.set(24*Math.cos(earth_angle),0,24*Math.sin(earth_angle));
      earth_angle += 2*Math.PI/365;
      earth_angle = earth_angle%(2*Math.PI);
      controls.update();
      renderer.render(scene, cameraused);
    }

    animate();

    // Ajuste do tamanho da janela em caso de redimensionamento (zoom in e zoom out)
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
</html>
