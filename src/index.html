<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ambiente 3D - Sistema Solar</title>
  <style>
    body { margin: 0; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>

    // Configuração da cena, câmera e renderizador
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      75, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.z = 15;

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Criação do Sol
    const sunGeometry = new THREE.SphereGeometry(3, 64, 32);
    const textureLoader = new THREE.TextureLoader();
    const sunTexture = textureLoader.load("./textures/2k_sun.jpg");
    const sunMaterial = new THREE.MeshBasicMaterial({ map: sunTexture });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    scene.add(sun);

    //Criação do Mercúrio
    const mercGeometry = new THREE.SphereGeometry(1.2, 64, 32);
    const texturemercLoader = new THREE.TextureLoader();
    const mercTexture = textureLoader.load("./textures/2k_mercury.jpg");
    const mercMaterial = new THREE.MeshBasicMaterial({ map: mercTexture});
    const merc = new THREE.Mesh(mercGeometry, mercMaterial);
    merc.position.set(7, 0, 0);
    scene.add(merc);

    //Animação do Mercurio 
     function animate() {
      requestAnimationFrame(animate);
       sun.rotation.y += 0.002;
       merc.rotation.y += 0.002;
      renderer.render(scene, camera);
    }
    animate();

    // Ajuste do tamanho da janela em caso de redimensionamento (zoom in e zoom out)
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
