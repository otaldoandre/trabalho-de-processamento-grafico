  <script type="module">
    import * as THREE from 'three';

    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

    const themeVertexShader = `varying vec2 vUv;

void main()
{
    vec4 modelPosition = modelMatrix * vec4(position, 1.0);
    vec4 viewPosition = viewMatrix * modelPosition;
    vec4 projectionPosition = projectionMatrix * viewPosition;
    gl_Position = projectionPosition;

    vUv = uv;
}`
    const themeFragmentShader = `uniform sampler2D uDayTexture1;
uniform sampler2D uNightTexture1;
uniform sampler2D uDayTexture2;
uniform sampler2D uNightTexture2;
uniform sampler2D uDayTexture3;
uniform sampler2D uNightTexture3;
uniform sampler2D uDayTexture4;
uniform sampler2D uNightTexture4;
uniform float uMixRatio;
uniform int uTextureSet;

varying vec2 vUv;

void main() {
    vec3 dayColor;
    vec3 nightColor;

    if(uTextureSet == 1) {
        dayColor = texture2D(uDayTexture1, vUv).rgb;
        nightColor = texture2D(uNightTexture1, vUv).rgb;
    } else if(uTextureSet == 2) {
        dayColor = texture2D(uDayTexture2, vUv).rgb;
        nightColor = texture2D(uNightTexture2, vUv).rgb;
    } else if(uTextureSet == 3) {
        dayColor = texture2D(uDayTexture3, vUv).rgb;
        nightColor = texture2D(uNightTexture3, vUv).rgb;
    } else {
        dayColor = texture2D(uDayTexture4, vUv).rgb;
        nightColor = texture2D(uNightTexture4, vUv).rgb;
    }

    vec3 finalColor = mix(dayColor, nightColor, uMixRatio);

    // Remove and add the other #includes if you want your glass to be unaffected
    finalColor = pow(finalColor, vec3(1.0/2.2));
    gl_FragColor = vec4(finalColor, 1.0);

    // Use this instead of the pow() calculation to avoid issues with the glass
    // I actually just like the white looking glass better.
    // #include <tonemapping_fragment>
    // #include <colorspace_fragment>
}
`;
    const manager = new THREE.LoadingManager();



    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf7edd0);
    scene.fog = new THREE.Fog(0xf7edd0, 0.002);

    const camera = new THREE.PerspectiveCamera(
      45, window.innerWidth / window.innerHeight, 1, 1000
    );
    camera.position.z = 15;

    const camera2 = new THREE.PerspectiveCamera(
      45, window.innerWidth / window.innerHeight, 0.1, 10000
    );
    

    const renderer = new THREE.WebGLRenderer({ antialias: true });

    const controls = new OrbitControls(camera, renderer.domElement);

    // ─── SHADER DO SOL ────────────────────────────────────────────────────────
    const sunVertexShader = `
      precision highp float;
      uniform mat4 projectionMatrix;
      uniform mat4 viewMatrix;
      uniform mat4 modelMatrix;
      attribute vec3 position;
      attribute vec3 normal;
      varying vec3 vPosition;
      varying vec3 vNormal;
      varying vec3 vWorldPosition;
      void main() {
        vPosition = position;
        vNormal = normalize(mat3(modelMatrix) * normal);
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPos.xyz;
        gl_Position = projectionMatrix * viewMatrix * worldPos;
      }
    `;

    const sunFragmentShader = `
      precision highp float;
      uniform float uTime;
      uniform vec3 cameraPosition;
      varying vec3 vPosition;
      varying vec3 vNormal;
      varying vec3 vWorldPosition;

      float hash(vec3 p) {
        p = fract(p * 0.3183099 + 0.1);
        p *= 17.0;
        return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
      }
      float noise(vec3 x) {
        vec3 i = floor(x);
        vec3 f = fract(x);
        f = f * f * (3.0 - 2.0 * f);
        return mix(mix(mix(hash(i+vec3(0,0,0)), hash(i+vec3(1,0,0)), f.x), mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y), mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x), mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y), f.z);
      }
      float fbm(vec3 p) {
        float v = 0.0; float a = 0.5;
        for (int i = 0; i < 5; i++) { v += a * noise(p); p = p * 2.0; a *= 0.5; }
        return v;
      }
      void main() {
        vec3 p = normalize(vPosition) * 4.0;
        float t = uTime * 0.2;
        float noiseLayer1 = fbm(p + vec3(t, 0.0, 0.0));
        float noiseLayer2 = fbm(p + vec3(0.0, -t, 0.0));
        float noiseLayer3 = fbm(p + vec3(0.0, 0.0, t));
        float brightness = (noiseLayer1 + noiseLayer2 + noiseLayer3) / 3.0;
        brightness = brightness * 1.5;
        float b = brightness;
        vec3 color = vec3(b, b * b, b * b * b * b);
        color *= 1.4;
        vec3 viewDir = normalize(cameraPosition - vWorldPosition);
        float fresnel = 1.0 - max(dot(vNormal, viewDir), 0.0);
        fresnel = pow(fresnel, 3.0);
        color += vec3(1.0, 0.6, 0.1) * fresnel * 0.8;
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const textureLoader = new THREE.TextureLoader();
    const sunTexture = textureLoader.load("./textures/2k_sun.jpg");

    const sunUniforms = {
      uTime: { value: 0.0 },

    const sunMaterial = new THREE.RawShaderMaterial({

    const sunGeometry = new THREE.SphereGeometry(6, 64, 32);

    // ─── CORONA ──────────────────────────────────────────────────────────────
    const coronaVertexShader = `
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vNormal   = normalize(normalMatrix * normal);
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const coronaFragmentShader = `
      uniform float uTime;
      varying vec3 vNormal;
      varying vec3 vPosition;
      float hash(vec2 p) {
        vec3 p3 = fract(vec3(p.xyx) * 0.1031);
        p3 += dot(p3, p3.yzx + 33.33);
        return fract((p3.x + p3.y) * p3.z);
      }
      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i+vec2(0,0)), hash(i+vec2(1,0)), u.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
      }
      void main() {
        vec3 viewDir = normalize(cameraPosition - vPosition);
        float fresnel = 1.0 - max(dot(vNormal, viewDir), 0.0);
        fresnel = pow(fresnel, 3.0);
        float t = uTime * 0.15;
        vec2 uv = vec2(atan(vPosition.z, vPosition.x) * 0.159 + t, vPosition.y * 0.1);
        float n = noise(uv * 3.0) * 0.5 + noise(uv * 7.0 + 0.3) * 0.3;
        float corona = fresnel * (0.7 + 0.3 * n);
        float pulse = 0.85 + 0.15 * sin(uTime * 0.8);
        corona *= pulse;
        vec3 color = mix(vec3(1.0, 0.4, 0.0), vec3(1.0, 0.9, 0.3), n);
        gl_FragColor = vec4(color, corona * 0.75);
      }
    `;

    const coronaUniforms = { uTime: { value: 0.0 } };
    const coronaMaterial = new THREE.ShaderMaterial({
      vertexShader: coronaVertexShader,
      fragmentShader: coronaFragmentShader,
      uniforms: coronaUniforms,
      side: THREE.BackSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const coronaGeometry = new THREE.SphereGeometry(7.2, 64, 32);
    const corona = new THREE.Mesh(coronaGeometry, coronaMaterial);
    scene.add(corona);

    // ─── HALO EXTERNO ─────────────────────────────────────────────────────────
    const glowMaterial = new THREE.ShaderMaterial({
      vertexShader: coronaVertexShader,
      fragmentShader: `
        uniform float uTime;
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
          vec3 viewDir = normalize(cameraPosition - vPosition);
          float fresnel = 1.0 - max(dot(vNormal, viewDir), 0.0);
          fresnel = pow(fresnel, 5.0);
          float pulse = 0.9 + 0.1 * sin(uTime * 0.6);
          gl_FragColor = vec4(1.0, 0.6, 0.1, fresnel * 0.35 * pulse);
        }
      `,
      uniforms: { uTime: { value: 0.0 }, cameraPosition: { value: camera.position } },
      side: THREE.BackSide,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const glowGeometry = new THREE.SphereGeometry(9.0, 32, 32);
    const glow = new THREE.Mesh(glowGeometry, glowMaterial);
    scene.add(glow);

    let little_prince;

    }, undefined, (error) => {

    // ─── GLOBO DE NEVE ─────────────────────────────────────────────────────
  gltfLoader.load('./models/globom.glb', (gltf) => {

      const globoParent = new THREE.Group();
      globoParent.add(globo);
      globoParent.scale.set(15, 15, 15);

      // Mover sistema solar para o centro
      globoParent.position.set(0, 0, 0);

      scene.add(globoParent);
  });


    // ─── NUVEM DE POEIRA ──────────────────────────────────────────────────────
    const mainCosmicDustTexture = textureLoader.load("./textures/main_cosmic_dust.png");
    const materialSprite = new THREE.MeshStandardMaterial({
      map: mainCosmicDustTexture,
      side: THREE.DoubleSide,

    const geometrySphere_ = new THREE.Mesh(geometrySphere, materialSprite);

    const geometry = new THREE.BufferGeometry();

    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    const material_ = new THREE.PointsMaterial({ color: 0x888888, size: 1 });
    const points = new THREE.Points(geometry, material_);
    scene.add(points);

  // ─── SETUP QUARTO ────────────────────────────────────────────────────────────

  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath("./draco/");

  const dLoader = new GLTFLoader(manager);
  dLoader.setDRACOLoader(dracoLoader);

  const environmentMap = new THREE.CubeTextureLoader()
    .setPath("textures/skybox/")
    .load(["px.webp", "nx.webp", "py.webp", "ny.webp", "pz.webp", "nz.webp"]);

  const textureMap = {

  const loadedTextures = {

  Object.entries(textureMap).forEach(([key, paths]) => {

  // Materiais
  const glassMaterial = new THREE.MeshPhysicalMaterial({

  const createMaterialForTextureSet = (textureSet) => {
    const material = new THREE.ShaderMaterial({
      uniforms: {
        uDayTexture1: { value: loadedTextures.day.First },
        uDayTexture2: { value: loadedTextures.day.Second },

        uMixRatio: { value: 0 },
        uTextureSet: { value: textureSet },
      },
      vertexShader: themeVertexShader,
      fragmentShader: themeFragmentShader,
    });

    Object.entries(material.uniforms).forEach(([key, uniform]) => {
      if (uniform.value instanceof THREE.Texture) {
        uniform.value.minFilter = THREE.LinearFilter;
        uniform.value.magFilter = THREE.LinearFilter;
      }
    });

    return material;
  };

  const roomMaterials = {

  // Setup do vídeo

  const videoTexture = new THREE.VideoTexture(videoElement);

  videoTexture.flipY = false;

  // Setup do Mesh

    // Materiais — MeshStandardMaterial com emissive para garantir visibilidade
    const bodyMat   = new THREE.MeshStandardMaterial({ color: 0xdde8f0, emissive: 0x99aabb, emissiveIntensity: 0.6, metalness: 0.4, roughness: 0.4 });
    const noseMat   = new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xcc2200, emissiveIntensity: 0.7, metalness: 0.2, roughness: 0.5 });
    const finMat    = new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xcc2200, emissiveIntensity: 0.7, metalness: 0.2, roughness: 0.5 });
    const windowMat = new THREE.MeshStandardMaterial({ color: 0x88ddff, emissive: 0x2266aa, emissiveIntensity: 0.9, metalness: 0.1, roughness: 0.1 });
    const nozzleMat = new THREE.MeshStandardMaterial({ color: 0x888888, emissive: 0x444444, emissiveIntensity: 0.5, metalness: 0.7, roughness: 0.4 });
    const ringMat   = new THREE.MeshStandardMaterial({ color: 0xcc3311, emissive: 0xaa2200, emissiveIntensity: 0.7, metalness: 0.2, roughness: 0.5 });

    // Corpo cilíndrico principal
    const bodyGeo = new THREE.CylinderGeometry(0.28, 0.32, 1.6, 24);
    const body    = new THREE.Mesh(bodyGeo, bodyMat);
    rocket.add(body);

    // Nariz cônico
    const noseGeo = new THREE.ConeGeometry(0.28, 0.9, 24);
    const nose    = new THREE.Mesh(noseGeo, noseMat);
    nose.position.y = 1.25;
    rocket.add(nose);

    // Janela esférica
    const winGeo = new THREE.SphereGeometry(0.13, 16, 16);
    const win    = new THREE.Mesh(winGeo, windowMat);
    win.position.set(0.28, 0.3, 0);
    rocket.add(win);

    // Faixa decorativa (anel)
    const band1Geo = new THREE.TorusGeometry(0.30, 0.035, 8, 24);
    const band1    = new THREE.Mesh(band1Geo, ringMat);
    band1.rotation.x = Math.PI / 2;
    band1.position.y = 0.1;
    rocket.add(band1);

    const band2Geo = new THREE.TorusGeometry(0.30, 0.035, 8, 24);
    const band2    = new THREE.Mesh(band2Geo, ringMat);
    band2.rotation.x = Math.PI / 2;
    band2.position.y = -0.45;
    rocket.add(band2);

    // Bocal do motor (base)
    const nozzleGeo = new THREE.CylinderGeometry(0.18, 0.28, 0.35, 20);
    const nozzle    = new THREE.Mesh(nozzleGeo, nozzleMat);
    nozzle.position.y = -1.075;
    rocket.add(nozzle);

    // Abertura do bocal (cone invertido)
    const throatGeo = new THREE.ConeGeometry(0.22, 0.25, 20, 1, true);
    const throat    = new THREE.Mesh(throatGeo, nozzleMat);
    throat.position.y = -1.375;
    throat.rotation.x = Math.PI;
    rocket.add(throat);

    // 4 Aletas
    const finShape = new THREE.Shape();
    finShape.moveTo(0,   0);
    finShape.lineTo(0.5, -0.55);
    finShape.lineTo(0.5, -0.85);
    finShape.lineTo(0,   -0.65);
    finShape.closePath();

    const extrudeSettings = { depth: 0.055, bevelEnabled: false };
    const finGeo = new THREE.ExtrudeGeometry(finShape, extrudeSettings);

    for (let i = 0; i < 4; i++) {
      const fin = new THREE.Mesh(finGeo, finMat);
      fin.position.y = -0.75;
      fin.rotation.y = (i / 4) * Math.PI * 2;
      fin.rotation.z = 0;
      const wrapper = new THREE.Group();
      wrapper.rotation.y = (i / 4) * Math.PI * 2;
      // Posiciona cada aleta ao redor do cilindro
      fin.position.set(0.27, -0.75, -0.025);
      fin.rotation.y = 0;
      wrapper.add(fin);
      rocket.add(wrapper);
    }

    // ─── CHAMA DO MOTOR (partículas) ──────────────────────────────────────────
    const flameGroup = new THREE.Group();
    rocket.add(flameGroup);

    // Cone interno da chama (branco-amarelado)
    const flameCoreGeo = new THREE.ConeGeometry(0.10, 0.55, 16, 1, true);
    const flameCoreMat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.9,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const flameCore = new THREE.Mesh(flameCoreGeo, flameCoreMat);
    flameCore.position.y = -1.9;
    flameCore.rotation.x = Math.PI;
    flameGroup.add(flameCore);

    // Cone médio (laranja)
    const flameMidGeo = new THREE.ConeGeometry(0.17, 0.80, 16, 1, true);
    const flameMidMat = new THREE.MeshBasicMaterial({
      color: 0xff8800,
      transparent: true,
      opacity: 0.65,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const flameMid = new THREE.Mesh(flameMidGeo, flameMidMat);
    flameMid.position.y = -2.0;
    flameMid.rotation.x = Math.PI;
    flameGroup.add(flameMid);

    // Cone externo (vermelho escuro, maior)
    const flameOutGeo = new THREE.ConeGeometry(0.23, 1.1, 16, 1, true);
    const flameOutMat = new THREE.MeshBasicMaterial({
      color: 0xff3300,
      transparent: true,
      opacity: 0.35,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const flameOut = new THREE.Mesh(flameOutGeo, flameOutMat);
    flameOut.position.y = -2.15;
    flameOut.rotation.x = Math.PI;
    flameGroup.add(flameOut);

    // Partículas de faísca
    const sparkCount = 80;
    const sparkGeo   = new THREE.BufferGeometry();
    const sparkPos   = new Float32Array(sparkCount * 3);
    const sparkData  = []; // armazena velocidade e tempo de vida de cada partícula

    for (let i = 0; i < sparkCount; i++) {
      sparkPos[i * 3]     = (Math.random() - 0.5) * 0.25;
      sparkPos[i * 3 + 1] = -(1.6 + Math.random() * 1.2);
      sparkPos[i * 3 + 2] = (Math.random() - 0.5) * 0.25;
      sparkData.push({ life: Math.random(), speed: 0.012 + Math.random() * 0.018 });
    }
    sparkGeo.setAttribute('position', new THREE.Float32BufferAttribute(sparkPos, 3));

    const sparkMat = new THREE.PointsMaterial({
      color: 0xffcc44,
      size: 0.06,
      transparent: true,
      opacity: 0.85,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const sparks = new THREE.Points(sparkGeo, sparkMat);
    rocket.add(sparks);

    // Escala geral do foguete
    rocket.scale.set(0.85, 0.85, 0.85);

    // Foguete na horizontal: rotaciona 90° em Z para deitar o eixo Y na direção X
    rocket.rotation.z = -Math.PI / 2;

    // Posição fixa entre Mercúrio (r=10) e Vênus (r=16), próximo ao sol
    rocket.position.set(13, 2, 4);

    scene.add(rocket);

    // ─── ESTRELA CADENTE ──────────────────────────────────────────────────────
    const shootingStarGroup = new THREE.Group();

    const starGeo = new THREE.CylinderGeometry(0.02, 0.2, 10, 8);
    starGeo.rotateZ(Math.PI / 2); 

    const starMat = new THREE.MeshBasicMaterial({ 
      color: 0xffffff, 
      transparent: true,
      opacity: 0.8, 
      blending: THREE.AdditiveBlending, 
      depthWrite: false
    });

    const shootingStarMesh = new THREE.Mesh(starGeo, starMat);
    shootingStarGroup.add(shootingStarMesh);

    const starHeadGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const starHeadMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const starHead = new THREE.Mesh(starHeadGeo, starHeadMat);
    starHead.position.x = -5; 
    shootingStarGroup.add(starHead);

    shootingStarGroup.position.set(35, 15, -10); 
    shootingStarGroup.rotation.z = Math.PI / 8;
    
    scene.add(shootingStarGroup);

    // ─── CÂMERA ───────────────────────────────────────────────────────────────
    let useOrtho = true;
    let cameraused = useOrtho ? camera : camera2;
    window.addEventListener("keydown", (event) => {
      if (event.key === "c") {
        useOrtho = !useOrtho;
        cameraused = useOrtho ? camera : camera2;
      }
    });

    // ─── ANIMAÇÃO ─────────────────────────────────────────────────────────────
    let venus_angle = 0;
    let merc_angle  = 0;
    let earth_angle = 0;

    const clock = new THREE.Clock();

    function updateSparks(elapsed) {
      const positions = sparkGeo.attributes.position.array;
      for (let i = 0; i < sparkCount; i++) {
        sparkData[i].life += sparkData[i].speed;
        if (sparkData[i].life > 1.0) {
          // Reinicia a partícula perto do bocal
          sparkData[i].life = 0;
          positions[i * 3]     = (Math.random() - 0.5) * 0.20;
          positions[i * 3 + 1] = -1.55;
          positions[i * 3 + 2] = (Math.random() - 0.5) * 0.20;
        } else {
          // Dispersa para baixo
          positions[i * 3]     += (Math.random() - 0.5) * 0.012;
          positions[i * 3 + 1] -= sparkData[i].speed * 1.4;
          positions[i * 3 + 2] += (Math.random() - 0.5) * 0.012;
        }
      }
      sparkGeo.attributes.position.needsUpdate = true;
    }

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      // Uniforms de tempo
      sunUniforms.uTime.value           = elapsed;
      coronaUniforms.uTime.value        = elapsed;
      glowMaterial.uniforms.uTime.value = elapsed;
      glowMaterial.uniforms.cameraPosition.value.copy(camera.position);

      // Rotações
      sun.rotation.y   += 0.0067;
      earth.rotation.y += 0.0025;
      merc.rotation.y  += 0.003;
      venus.rotation.y += 0.0008;

      // Órbitas dos planetas
      venus.position.set(16 * Math.cos(venus_angle), 0, 16 * Math.sin(venus_angle));
      venus_angle = (venus_angle + 2 * Math.PI / 225) % (2 * Math.PI);

      merc.position.set(-10 * Math.cos(merc_angle), 0, -10 * Math.sin(merc_angle));
      if (little_prince) {
        little_prince.position.set(-10 * Math.cos(merc_angle), 2.5, -10 * Math.sin(merc_angle));
      }
      merc_angle = (merc_angle + 2 * Math.PI / 400) % (2 * Math.PI);

      earth.position.set(24 * Math.cos(earth_angle), 0, 24 * Math.sin(earth_angle));
      earth_angle = (earth_angle + 2 * Math.PI / 365) % (2 * Math.PI);

      // Animação da Estrela Cadente
      shootingStarGroup.position.x -= 0.8; 
      shootingStarGroup.position.y -= 0.35; 

      if (shootingStarGroup.position.x < -35) {
        shootingStarGroup.position.x = 35 + Math.random() * 5; 
        shootingStarGroup.position.y = 10 + Math.random() * 15; 
        shootingStarGroup.position.z = -10 - Math.random() * 10; 
        
        const scale = 0.5 + Math.random() * 0.8;
        shootingStarGroup.scale.set(scale, scale, scale);
        starMat.opacity = 0.4 + Math.random() * 0.6;
      }

      // Pulso das chamas
      const flamePulse = 0.88 + 0.12 * Math.sin(elapsed * 18.0);
      flameCore.scale.set(flamePulse, flamePulse + 0.05 * Math.sin(elapsed * 22), flamePulse);
      flameMid.scale.set(flamePulse * 0.95, flamePulse, flamePulse * 0.95);
      flameOut.scale.set(1.0, flamePulse * 1.05, 1.0);

      // Opacidade animada da chama
      flameCoreMat.opacity = 0.80 + 0.15 * Math.sin(elapsed * 20);
      flameMidMat.opacity  = 0.50 + 0.15 * Math.sin(elapsed * 15 + 1.0);
      flameOutMat.opacity  = 0.25 + 0.10 * Math.sin(elapsed * 12 + 2.0);

      // Atualiza faíscas
      updateSparks(elapsed);

      controls.update();
      renderer.render(scene, cameraused);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
