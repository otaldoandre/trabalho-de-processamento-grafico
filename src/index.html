<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ambiente 3D - Sistema Solar</title>
  <style>
    body { margin: 0; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030342);
    scene.fog = new THREE.Fog(0x030342, 0.002);

    const camera = new THREE.PerspectiveCamera(
      75, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.z = 15;

    const camera2 = new THREE.PerspectiveCamera(
      80, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera2.position.z = 18;
    const w = 1920;
    const h = 1080;
    const fullWidth = w * 3;
    const fullHeight = h * 2;
    camera2.setViewOffset(fullWidth, fullHeight, 500, 500, w, h);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.minDistance = 15;
    controls.maxDistance = 30;
    camera.position.set(0, 20, 100);
    controls.update();

    // ─── SHADER DO SOL (referencia: vídeo do Yuri Artiukh) ────────────────────────────────────────
    const sunVertexShader = `
      precision highp float;

      uniform mat4 projectionMatrix;
      uniform mat4 viewMatrix;
      uniform mat4 modelMatrix;

      attribute vec3 position;
      attribute vec3 normal;

      varying vec3 vPosition;
      varying vec3 vNormal;
      varying vec3 vWorldPosition; // <-- ADICIONADO
      
      void main() {
        vPosition = position;
        vNormal = normalize(mat3(modelMatrix) * normal);
        
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPos.xyz; // <-- ADICIONADO
        
        gl_Position = projectionMatrix * viewMatrix * worldPos;
      }
    `;

    const sunFragmentShader = `
      precision highp float;

      uniform float uTime;
      uniform vec3 cameraPosition; // <-- ADICIONADO: Posição real da câmera
      
      varying vec3 vPosition;
      varying vec3 vNormal;
      varying vec3 vWorldPosition; // <-- ADICIONADO

      float hash(vec3 p) {
        p = fract(p * 0.3183099 + 0.1);
        p *= 17.0;
        return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
      }

      float noise(vec3 x) {
        vec3 i = floor(x);
        vec3 f = fract(x);
        f = f * f * (3.0 - 2.0 * f);
        return mix(mix(mix(hash(i+vec3(0,0,0)), hash(i+vec3(1,0,0)), f.x), mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y), mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x), mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y), f.z);
      }

      float fbm(vec3 p) {
        float v = 0.0; float a = 0.5;
        for (int i = 0; i < 5; i++) {
          v += a * noise(p); p = p * 2.0; a *= 0.5;
        }
        return v;
      }

      void main() {
        vec3 p = normalize(vPosition) * 4.0;
        float t = uTime * 0.2;
        
        float noiseLayer1 = fbm(p + vec3(t, 0.0, 0.0));
        float noiseLayer2 = fbm(p + vec3(0.0, -t, 0.0));
        float noiseLayer3 = fbm(p + vec3(0.0, 0.0, t));

        float brightness = (noiseLayer1 + noiseLayer2 + noiseLayer3) / 3.0;
        brightness = brightness * 1.5;

        float b = brightness;
        vec3 color = vec3(b, b * b, b * b * b * b);
        color *= 1.4;

        // <-- O CALCULO CORRETO DO FRESNEL BASEADO NA SUA CÂMERA -->
        vec3 viewDir = normalize(cameraPosition - vWorldPosition); 
        float fresnel = 1.0 - max(dot(vNormal, viewDir), 0.0);
        fresnel = pow(fresnel, 3.0);
        color += vec3(1.0, 0.6, 0.1) * fresnel * 0.8;

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    // Material shader do Sol
    const textureLoader = new THREE.TextureLoader();
    const sunTexture = textureLoader.load("./textures/2k_sun.jpg");

    const sunUniforms = {
      uTime: { value: 0.0 },
      cameraPosition: { value: camera.position }
    };

    const sunMaterial = new THREE.RawShaderMaterial({
      vertexShader: sunVertexShader,
      fragmentShader: sunFragmentShader,
      uniforms: sunUniforms
    });

    const sunGeometry = new THREE.SphereGeometry(6, 64, 32);
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    scene.add(sun);

    // ─── CORONA (halo ao redor do sol) ──────────────────────────────────────
    const coronaVertexShader = `
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vNormal   = normalize(normalMatrix * normal);
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const coronaFragmentShader = `
      uniform float uTime;
      varying vec3 vNormal;
      varying vec3 vPosition;

      float hash(vec2 p) {
        vec3 p3 = fract(vec3(p.xyx) * 0.1031);
        p3 += dot(p3, p3.yzx + 33.33);
        return fract((p3.x + p3.y) * p3.z);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(
          mix(hash(i + vec2(0,0)), hash(i + vec2(1,0)), u.x),
          mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x),
          u.y
        );
      }

      void main() {
        // Fresnel — visível apenas nas bordas
        vec3 viewDir = normalize(cameraPosition - vPosition);
        float fresnel = 1.0 - max(dot(vNormal, viewDir), 0.0);
        fresnel = pow(fresnel, 3.0);

        // Variação de ruído para corona irregular
        float t = uTime * 0.15;
        vec2 uv = vec2(atan(vPosition.z, vPosition.x) * 0.159 + t, vPosition.y * 0.1);
        float n = noise(uv * 3.0) * 0.5 + noise(uv * 7.0 + 0.3) * 0.3;

        float corona = fresnel * (0.7 + 0.3 * n);

        // Pulsação suave
        float pulse = 0.85 + 0.15 * sin(uTime * 0.8);
        corona *= pulse;

        vec3 color = mix(vec3(1.0, 0.4, 0.0), vec3(1.0, 0.9, 0.3), n);
        gl_FragColor = vec4(color, corona * 0.75);
      }
    `;

    const coronaUniforms = { uTime: { value: 0.0 } };

    const coronaMaterial = new THREE.ShaderMaterial({
      vertexShader:   coronaVertexShader,
      fragmentShader: coronaFragmentShader,
      uniforms:       coronaUniforms,
      side:           THREE.BackSide,
      transparent:    true,
      blending:       THREE.AdditiveBlending,
      depthWrite:     false
    });

    const coronaGeometry = new THREE.SphereGeometry(7.2, 64, 32);
    const corona = new THREE.Mesh(coronaGeometry, coronaMaterial);
    scene.add(corona);

    // ─── HALO EXTERNO (glow difuso) ──────────────────────────────────────────
    const glowMaterial = new THREE.ShaderMaterial({
      vertexShader: coronaVertexShader,
      fragmentShader: `
        uniform float uTime;
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
          vec3 viewDir = normalize(cameraPosition - vPosition);
          float fresnel = 1.0 - max(dot(vNormal, viewDir), 0.0);
          fresnel = pow(fresnel, 5.0);
          float pulse = 0.9 + 0.1 * sin(uTime * 0.6);
          gl_FragColor = vec4(1.0, 0.6, 0.1, fresnel * 0.35 * pulse);
        }
      `,
      uniforms:    { uTime: { value: 0.0 }, cameraPosition: { value: camera.position } },
      side:        THREE.BackSide,
      transparent: true,
      blending:    THREE.AdditiveBlending,
      depthWrite:  false
    });

    const glowGeometry = new THREE.SphereGeometry(9.0, 32, 32);
    const glow = new THREE.Mesh(glowGeometry, glowMaterial);
    scene.add(glow);

    // Luz pontual emanando do sol
    const sunLight = new THREE.PointLight(0xffaa33, 3, 200);
    scene.add(sunLight);

    // ─── TERRA ───────────────────────────────────────────────────────────────
    const earthGeometry = new THREE.SphereGeometry(2.1, 64, 32);
    const earthTexture = textureLoader.load("./textures/2k_earth_daymap.jpg");
    const earthMaterial = new THREE.MeshBasicMaterial({ map: earthTexture });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earth.position.set(-23, 0, 0);
    scene.add(earth);

    // ─── MERCÚRIO ─────────────────────────────────────────────────────────────
    const mercGeometry = new THREE.SphereGeometry(0.9, 64, 32);
    const mercTexture = textureLoader.load("./textures/2k_mercury.jpg");
    const mercMaterial = new THREE.MeshBasicMaterial({ map: mercTexture });
    const merc = new THREE.Mesh(mercGeometry, mercMaterial);
    merc.position.set(10, 0, 0);
    scene.add(merc);

    // ─── VÊNUS ───────────────────────────────────────────────────────────────
    const venusGeometry = new THREE.SphereGeometry(2.0, 64, 32);
    const venusTexture = textureLoader.load("./textures/2k_venus.jpg");
    const venusMaterial = new THREE.MeshBasicMaterial({ map: venusTexture });
    const venus = new THREE.Mesh(venusGeometry, venusMaterial);
    venus.position.set(0, 0, 0);
    scene.add(venus);

    // ─── PEQUENO PRÍNCIPE ─────────────────────────────────────────────────────
    let little_prince;
    const gltfLoader = new GLTFLoader();
    gltfLoader.load('./models/little_prince.glb', (gltf) => {
      const object = gltf.scene;
      object.scale.set(0.022, 0.022, 0.022);
      object.position.set(10, 2.5, 0);
      object.rotation.y = -5;
      scene.add(object);
      little_prince = object;
    }, undefined, (error) => {
      console.error('Erro ao carregar objeto:', error);
    });

    // ─── NUVEM DE POEIRA ──────────────────────────────────────────────────────
    const mainCosmicDustTexture = textureLoader.load("./textures/main_cosmic_dust.png");
    const materialSprite = new THREE.MeshStandardMaterial({
      map: mainCosmicDustTexture,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 1,
      blending: THREE.AdditiveBlending
    });
    const geometrySphere = new THREE.IcosahedronGeometry(850, 15);
    const geometrySphere_ = new THREE.Mesh(geometrySphere, materialSprite);
    scene.add(geometrySphere_);

    // ─── ESTRELAS ────────────────────────────────────────────────────────────
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    for (let i = 0; i < 10000; i++) {
      vertices.push(
        THREE.MathUtils.randFloatSpread(2000),
        THREE.MathUtils.randFloatSpread(2000),
        THREE.MathUtils.randFloatSpread(2000)
      );
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    const material_ = new THREE.PointsMaterial({ color: 0x888888, size: 1 });
    const points = new THREE.Points(geometry, material_);
    scene.add(points);

    // ─── CÂMERA ───────────────────────────────────────────────────────────────
    let useOrtho = true;
    let cameraused = useOrtho ? camera : camera2;
    window.addEventListener("keydown", (event) => {
      if (event.key === "c") {
        useOrtho = !useOrtho;
        cameraused = useOrtho ? camera : camera2;
      }
    });

    // ─── ANIMAÇÃO ─────────────────────────────────────────────────────────────
    let venus_angle = 0;
    let merc_angle  = 0;
    let earth_angle = 0;

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      // Atualizar uniforms de tempo dos shaders
      sunUniforms.uTime.value     = elapsed;
      coronaUniforms.uTime.value  = elapsed;
      glowMaterial.uniforms.uTime.value = elapsed;
      glowMaterial.uniforms.cameraPosition.value.copy(camera.position);

      // Rotações
      sun.rotation.y  += 0.0067;
      earth.rotation.y += 0.0025;
      merc.rotation.y  += 0.003;
      venus.rotation.y += 0.0008;

      // Órbitas
      venus.position.set(16 * Math.cos(venus_angle), 0, 16 * Math.sin(venus_angle));
      venus_angle = (venus_angle + 2 * Math.PI / 225) % (2 * Math.PI);

      merc.position.set(-10 * Math.cos(merc_angle), 0, -10 * Math.sin(merc_angle));
      if (little_prince) {
        little_prince.position.set(-10 * Math.cos(merc_angle), 2.5, -10 * Math.sin(merc_angle));
      }
      merc_angle = (merc_angle + 2 * Math.PI / 88) % (2 * Math.PI);

      earth.position.set(24 * Math.cos(earth_angle), 0, 24 * Math.sin(earth_angle));
      earth_angle = (earth_angle + 2 * Math.PI / 365) % (2 * Math.PI);

      controls.update();
      renderer.render(scene, cameraused);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
